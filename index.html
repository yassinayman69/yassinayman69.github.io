<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yassin Ayman | Mechatronics Dossier</title>
    <style>
        .slide { display: none; }
        .slide.active { display: block !important; }
    </style>
</head>
<body>

    <div class="presentation-stage">
        <div class="slide active"><h1>YASSIN AYMAN</h1></div>
        <div class="slide"><h2>Multi-Stage Kinematic Gearbox</h2></div>
        <div class="slide"><h2>4-DOF Robotic Arm</h2></div>
        <div class="slide"><h2>Solar Panel Structure</h2></div>
        <div class="slide"><h2>C-Code Terminal</h2></div>

        <div class="footer-navigation">
            <button class="action-button" onclick="navigateDeck(-1)">PREV</button>
            <button class="action-button" onclick="navigateDeck(1)">NEXT</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.slidePointer = 0;
            window.deckSlides = document.querySelectorAll('.slide');
        });

        function navigateDeck(step) {
            // Hide current
            deckSlides[slidePointer].classList.remove('active');
            
            // Calculate new
            slidePointer = (slidePointer + step + deckSlides.length) % deckSlides.length;
            
            // Show new
            deckSlides[slidePointer].classList.add('active');
            console.log("Showing slide index:", slidePointer);
        }
    </script>
</body>
</html>
